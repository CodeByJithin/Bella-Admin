<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f0fa;
      --card: #fff;
      --accent: #f5a623;
      --red: #e8294c;
      --text: #1a1a2e;
      --muted: #8a8a9a;
      --border: #e8e0f0;
      --green: #16a34a;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: #fff;
      height: 56px;
      padding: 0 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 9px;
      text-decoration: none;
      min-width: 0;
    }

    .logo-mark {
      width: 34px;
      height: 34px;
      background: var(--text);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-mark svg {
      width: 17px;
      height: 17px;
    }

    .logo-name {
      font-size: 1rem;
      font-weight: 900;
      color: var(--text);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: var(--bg);
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .add-btn {
      height: 36px;
      padding: 0 16px;
      background: var(--text);
      color: #fff;
      border: none;
      border-radius: 50px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.82rem;
      font-weight: 800;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    main {
      padding: 14px 12px 80px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: 0.95rem;
      font-weight: 900;
    }

    .count-pill {
      font-size: 0.72rem;
      font-weight: 800;
      color: var(--muted);
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 50px;
      padding: 3px 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 9px;
    }

    @media (min-width: 580px) {
      .grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    @media (min-width: 900px) {
      .grid {
        grid-template-columns: repeat(5, 1fr);
      }
    }

    .p-card {
      background: var(--card);
      border-radius: 14px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 1px 6px rgba(26,26,46,0.07);
      cursor: pointer;
    }

    .p-img {
      width: 100%;
      aspect-ratio: 1/1;
      object-fit: cover;
      background: #f0ebf8;
      display: block;
    }

    .sale-badge {
      position: absolute;
      top: 6px;
      left: 6px;
      background: #fff3e0;
      color: #d84e00;
      font-size: 0.58rem;
      font-weight: 900;
      padding: 2px 7px;
      border-radius: 50px;
      border: 1px solid #ffd18a;
      text-transform: uppercase;
    }

    .del-btn {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 26px;
      height: 26px;
      background: rgba(255,255,255,0.88);
      border: 1px solid rgba(26,26,46,0.12);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 2;
    }

    .p-info {
      padding: 8px 9px 10px;
    }

    .p-name {
      font-size: 0.78rem;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }

    .p-price {
      font-size: 0.9rem;
      font-weight: 900;
      margin-bottom: 6px;
    }

    .pill-row {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }

    .tag {
      font-size: 0.6rem;
      font-weight: 800;
      padding: 2px 7px;
      border-radius: 50px;
      border: 1.5px solid;
      display: inline-flex;
      align-items: center;
      gap: 3px;
    }

    .tag-active {
      background: #dcfce7;
      color: #15803d;
      border-color: #bbf7d0;
    }

    .tag-inactive {
      background: #fef2f2;
      color: var(--red);
      border-color: #fecaca;
    }

    .tag-instock {
      background: #eff6ff;
      color: #1d4ed8;
      border-color: #bfdbfe;
    }

    .tag-outstock {
      background: #fef2f2;
      color: var(--red);
      border-color: #fecaca;
    }

    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10,8,20,0.45);
      z-index: 200;
      align-items: flex-end;
      justify-content: center;
    }

    .overlay.open {
      display: flex;
    }

    .sheet {
      background: #fff;
      border-radius: 22px 22px 0 0;
      width: 100%;
      max-width: 540px;
      max-height: 92vh;
      display: flex;
      flex-direction: column;
    }

    .sheet-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 18px 10px;
      border-bottom: 1px solid var(--border);
    }

    .sheet-body {
      overflow-y: auto;
      flex: 1;
      padding: 14px 18px;
    }

    .sheet-foot {
      padding: 12px 18px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      background: #fff;
    }

    .img-box {
      width: 100%;
      height: 110px;
      background: #f0ebf8;
      border-radius: 12px;
      border: 1.5px dashed var(--border);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
    }

    .img-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .sec-label {
      font-size: 0.65rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
      margin: 12px 0 7px;
    }

    .fg {
      display: grid;
      gap: 8px;
    }

    .fg.c2 {
      grid-template-columns: 1fr 1fr;
    }

    .fg.c3 {
      grid-template-columns: 1fr 1fr 1fr;
    }

    .fld {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .fld label {
      font-size: 0.68rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .fld input,
    .fld select {
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font-family: 'Nunito', sans-serif;
      font-size: 16px;
      font-weight: 700;
      background: #fafafa;
      outline: none;
      width: 100%;
    }

    .btn-cancel,
    .btn-save,
    .btn-delete {
      height: 46px;
      border-radius: 12px;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      border: none;
      cursor: pointer;
    }

    .btn-cancel {
      background: var(--bg);
      border: 1.5px solid var(--border);
      color: var(--muted);
      padding: 0 16px;
    }

    .btn-save {
      flex: 1;
      background: var(--text);
      color: #fff;
    }

    .btn-delete {
      flex: 1;
      background: var(--red);
      color: #fff;
    }

    .toast-wrap {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 7px;
      width: calc(100% - 28px);
      max-width: 380px;
    }

    .toast {
      border-radius: 12px;
      padding: 12px 15px;
      font-size: 0.82rem;
      font-weight: 800;
      color: #fff;
    }

    .t-success { background: #16a34a; }
    .t-error { background: var(--red); }
    .t-warn { background: var(--accent); }
  </style>
</head>

<body>

<script>
  const user = JSON.parse(localStorage.getItem("user"));
  if (!user) window.location.href = "login.html";
</script>

<header>
  <a class="logo" href="#">
    <div class="logo-mark">
      <svg viewBox="0 0 20 20" fill="none">
        <path d="M2 3h16l-1.5 7H3.5L2 3z" fill="#f5a623"/>
      </svg>
    </div>
    <span class="logo-name">ShopAdmin</span>
  </a>

  <div class="header-actions">
    <button class="add-btn" onclick="openAdd()">Add</button>

    <button class="icon-btn" onclick="logout()">
      ⎋
    </button>
  </div>
</header>

<main>
  <div class="section-head">
    <span class="section-title">Products</span>
    <span class="count-pill" id="productCount">—</span>
  </div>

  <div class="grid" id="productGrid"></div>
</main>

<!-- PRODUCT MODAL -->
<div class="overlay" id="prodOverlay">
  <div class="sheet">

    <div class="sheet-head">
      <h2 id="sheetTitle">Add Product</h2>
      <button class="btn-cancel" onclick="closeProd()">✕</button>
    </div>

    <div class="sheet-body">

      <input type="hidden" id="pid"/>

      <div class="img-box" id="imgBox">
        Image Preview
      </div>

      <div class="sec-label">Image</div>

      <div class="fg">
        <div class="fld">
          <label>URL</label>
          <input type="url" id="image" placeholder="https://..." oninput="previewImg(this.value)">
        </div>
      </div>

      <div class="sec-label">Details</div>

      <div class="fg">
        <div class="fld">
          <label>Product Name</label>
          <input type="text" id="name">
        </div>
      </div>

      <div class="fg c2">
        <div class="fld">
          <label>Category</label>
          <input type="text" id="category">
        </div>

        <div class="fld">
          <label>Offer</label>
          <select id="offer">
            <option value="yes">Yes</option>
            <option value="no">No</option>
          </select>
        </div>
      </div>

      <div class="sec-label">Pricing</div>

      <div class="fg c3">
        <div class="fld">
          <label>Price</label>
          <input type="number" id="price">
        </div>

        <div class="fld">
          <label>MRP</label>
          <input type="number" id="originalPrice">
        </div>

        <div class="fld">
          <label>Discount</label>
          <input type="number" id="discount">
        </div>
      </div>

      <!-- UPDATED STATUS SECTION -->

      <div class="sec-label">Status</div>

      <div class="fg c2">

        <div class="fld">
          <label>Active</label>

          <select id="active">
            <option value="yes">Yes</option>
            <option value="no">No</option>
          </select>
        </div>

        <div class="fld">
          <label>Stock Out</label>

          <select id="stockout">
            <option value="no">No</option>
            <option value="yes">Yes</option>
          </select>
        </div>

      </div>

      <div class="sec-label">Extra</div>

      <div class="fg c2">
        <div class="fld">
          <label>Badge</label>
          <input type="text" id="badge">
        </div>

        <div class="fld">
          <label>Super Badge</label>
          <input type="text" id="superbadge">
        </div>
      </div>

      <div class="fg">
        <div class="fld">
          <label>Sold</label>
          <input type="text" id="sold">
        </div>
      </div>

    </div>

    <div class="sheet-foot">
      <button class="btn-cancel" onclick="closeProd()">Cancel</button>
      <button class="btn-save" id="saveBtn" onclick="saveProduct()">Save</button>
    </div>

  </div>
</div>

<!-- TOAST -->
<div class="toast-wrap" id="toastWrap"></div>

<script>
const SUPABASE_URL = "https://fyfpntcdxbwrzorstuhw.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ5ZnBudGNkeGJ3cnpvcnN0dWh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxOTUyODIsImV4cCI6MjA5Mzc3MTI4Mn0.DEXblUS20JEzr9L4r1ka-PwoYCsGni2DyZ_5FM7hPIU";
const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function toast(msg, type = 'success') {
  const wrap = document.getElementById('toastWrap');

  const t = document.createElement('div');
  t.className = `toast t-${type}`;
  t.innerText = msg;

  wrap.appendChild(t);

  setTimeout(() => {
    t.remove();
  }, 2500);
}

function previewImg(url) {
  const box = document.getElementById('imgBox');

  if (url && url.startsWith('http')) {
    box.innerHTML = `<img src="${url}" />`;
  } else {
    box.innerHTML = `Image Preview`;
  }
}

function resetForm() {

  [
    'pid',
    'name',
    'category',
    'price',
    'originalPrice',
    'discount',
    'image',
    'badge',
    'superbadge',
    'sold'
  ].forEach(id => {
    document.getElementById(id).value = '';
  });

  document.getElementById('offer').value = 'yes';

  document.getElementById('active').value = 'yes';
  document.getElementById('stockout').value = 'no';

  previewImg('');
}

function openAdd() {
  resetForm();

  document.getElementById('sheetTitle').textContent = 'Add Product';
  document.getElementById('saveBtn').textContent = 'Add Product';

  document.getElementById('prodOverlay').classList.add('open');
}

function openEdit(p) {

  resetForm();

  document.getElementById('sheetTitle').textContent = 'Edit Product';
  document.getElementById('saveBtn').textContent = 'Update';

  document.getElementById('pid').value = p.id;
  document.getElementById('name').value = p.name || '';
  document.getElementById('category').value = p.category || '';
  document.getElementById('price').value = p.price || '';
  document.getElementById('originalPrice').value = p.originalPrice || '';
  document.getElementById('discount').value = p.discount || '';
  document.getElementById('image').value = p.image || '';
  document.getElementById('badge').value = p.badge || '';
  document.getElementById('superbadge').value = p.superbadge || '';
  document.getElementById('sold').value = p.sold || '';
  document.getElementById('offer').value = p.offer || 'yes';

  /* UPDATED */

  document.getElementById('active').value = p.active || 'yes';
  document.getElementById('stockout').value = p.stockout || 'no';

  previewImg(p.image || '');

  document.getElementById('prodOverlay').classList.add('open');
}

function closeProd() {
  document.getElementById('prodOverlay').classList.remove('open');
}

async function saveProduct() {

  const id = document.getElementById('pid').value;

  const name = document.getElementById('name').value.trim();
  const price = document.getElementById('price').value;

  if (!name || !price) {
    toast('Name and price required', 'warn');
    return;
  }

  const payload = {

    user_id: user.id,

    name,

    category: document.getElementById('category').value.trim(),

    price: Number(price),

    originalPrice: Number(document.getElementById('originalPrice').value),

    discount: Number(document.getElementById('discount').value),

    image: document.getElementById('image').value.trim(),

    badge: document.getElementById('badge').value.trim(),

    superbadge: document.getElementById('superbadge').value.trim(),

    sold: document.getElementById('sold').value.trim(),

    offer: document.getElementById('offer').value,

    /* UPDATED */

    active: document.getElementById('active').value,

    stockout: document.getElementById('stockout').value
  };

  const res = id
    ? await db.from('products').update(payload).eq('id', id)
    : await db.from('products').insert([payload]);

  if (res.error) {
    toast('Error saving product', 'error');
    return;
  }

  closeProd();

  toast(id ? 'Product updated' : 'Product added');

  loadProducts();
}

async function loadProducts() {

  const grid = document.getElementById('productGrid');

  const { data, error } = await db
    .from('products')
    .select('*')
    .eq('user_id', user.id)
    .order('id', { ascending: true });

  if (error) {
    toast('Failed to load', 'error');
    return;
  }

  document.getElementById('productCount').textContent =
    `${data.length} items`;

  if (!data.length) {
    grid.innerHTML = `<p>No products found</p>`;
    return;
  }

  grid.innerHTML = data.map(p => {

    /* UPDATED */

    const sTag = p.active === 'no'
      ? `<span class="tag tag-inactive">Inactive</span>`
      : `<span class="tag tag-active">Active</span>`;

    const stTag = p.stockout === 'yes'
      ? `<span class="tag tag-outstock">Out of Stock</span>`
      : `<span class="tag tag-instock">In Stock</span>`;

    const sale = p.offer === 'yes'
      ? `<div class="sale-badge">Sale</div>`
      : '';

    return `

    <div class="p-card"
      onclick='openEdit(${JSON.stringify(p).replace(/'/g,"&#39;")})'>

      ${p.image
        ? `<img class="p-img" src="${p.image}" loading="lazy">`
        : `<div class="p-img"></div>`
      }

      ${sale}

      <div class="p-info">

        <div class="p-name">${p.name}</div>

        <div class="p-price">₹${p.price}</div>

        <div class="pill-row">
          ${sTag}
          ${stTag}
        </div>

      </div>

    </div>
    `;
  }).join('');
}

function logout() {
  localStorage.removeItem('user');
  window.location.href = 'login.html';
}

loadProducts();
</script>

</body>
</html>
