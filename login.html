<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f0fa;
      --card: #ffffff;
      --accent: #f5a623;
      --accent2: #e8294c;
      --text: #1a1a2e;
      --muted: #888;
      --border: #e8e0f0;
      --green: #16a34a;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      width: 420px; height: 420px;
      background: radial-gradient(circle, rgba(245,166,35,0.14) 0%, transparent 70%);
      top: -100px; right: -80px;
      border-radius: 50%;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      width: 320px; height: 320px;
      background: radial-gradient(circle, rgba(232,41,76,0.09) 0%, transparent 70%);
      bottom: -60px; left: -60px;
      border-radius: 50%;
      pointer-events: none;
    }

    .login-wrap {
      width: 100%;
      max-width: 380px;
      animation: fadeUp 0.4s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .brand {
      text-align: center;
      margin-bottom: 28px;
    }
    .brand-icon {
      width: 62px; height: 62px;
      background: var(--text);
      border-radius: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
      box-shadow: 0 8px 24px rgba(26,26,46,0.2);
    }
    .brand-icon svg { width: 30px; height: 30px; fill: var(--accent); }
    .brand h1 {
      font-size: 1.55rem;
      font-weight: 900;
      color: var(--text);
      letter-spacing: -0.5px;
    }
    .brand p {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 600;
      margin-top: 4px;
    }

    .login-card {
      background: var(--card);
      border-radius: 20px;
      padding: 28px 24px;
      box-shadow: 0 4px 32px rgba(26,26,46,0.1), 0 1px 4px rgba(26,26,46,0.04);
    }
    .login-card h2 {
      font-size: 1.15rem;
      font-weight: 900;
      margin-bottom: 4px;
    }
    .login-card .sub {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 22px;
    }

    .err-banner {
      background: #fff0f3;
      border: 1.5px solid #ffc1cc;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--accent2);
      margin-bottom: 14px;
      display: none;
      align-items: center;
      gap: 8px;
    }
    .err-banner.show { display: flex; }

    .field-label {
      font-size: 0.72rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: var(--text);
      margin-bottom: 6px;
      display: block;
    }
    .field-input {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      font-family: 'Nunito', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      background: #fafafa;
      outline: none;
      transition: border-color .18s, background .18s;
      margin-bottom: 14px;
    }
    .field-input:focus { border-color: var(--text); background: #fff; }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--text);
      color: #fff;
      border: none;
      border-radius: 14px;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      margin-top: 4px;
      transition: transform .15s, box-shadow .15s;
      box-shadow: 0 4px 16px rgba(26,26,46,0.22);
    }
    .btn-login:hover { transform: scale(1.02); box-shadow: 0 6px 22px rgba(26,26,46,0.3); }
    .btn-login:active { transform: scale(0.98); }
    .btn-login:disabled { opacity: 0.55; cursor: not-allowed; transform: none; box-shadow: none; }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M19 3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V5a2 2 0 00-2-2zm-7 3a3 3 0 110 6 3 3 0 010-6zm0 14c-3 0-5.5-1.57-5.5-3.5S9 13 12 13s5.5 1.57 5.5 3.5S15 20 12 20z"/>
      </svg>
    </div>
    <h1>ShopAdmin</h1>
    <p>Product management console</p>
  </div>

  <div class="login-card">
    <h2>Welcome back 👋</h2>
    <p class="sub">Sign in to manage your store</p>

    <div class="err-banner" id="errBanner">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
      <span id="errMsg"></span>
    </div>

    <label class="field-label" for="username">Username</label>
    <input class="field-input" type="text" id="username" placeholder="Enter your username" autocomplete="username"/>

    <label class="field-label" for="password">Password</label>
    <input class="field-input" type="password" id="password" placeholder="Enter your password"
      autocomplete="current-password" onkeydown="if(event.key==='Enter') login()"/>

    <button class="btn-login" id="loginBtn" onclick="login()">Sign In →</button>
  </div>
</div>

<script>
const SUPABASE_URL = "https://fyfpntcdxbwrzorstuhw.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ5ZnBudGNkeGJ3cnpvcnN0dWh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxOTUyODIsImV4cCI6MjA5Mzc3MTI4Mn0.DEXblUS20JEzr9L4r1ka-PwoYCsGni2DyZ_5FM7hPIU";
const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function login() {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value;
  const btn = document.getElementById("loginBtn");
  document.getElementById('errBanner').classList.remove('show');

  if (!username || !password) {
    document.getElementById('errMsg').textContent = "Please fill in all fields.";
    document.getElementById('errBanner').classList.add('show');
    return;
  }

  btn.disabled = true; btn.textContent = "Signing in…";
  const { data, error } = await db.from("users").select("*")
    .eq("username", username).eq("password", password).single();
  btn.disabled = false; btn.textContent = "Sign In →";

  if (error || !data) {
    document.getElementById('errMsg').textContent = "Invalid username or password.";
    document.getElementById('errBanner').classList.add('show');
    return;
  }
  localStorage.setItem("user", JSON.stringify(data));
  window.location.href = "admin.html";
}
</script>
</body>
</html>
